<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AdViSur — Smart Study Assistant</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <style>
      :root{
        --bg: #05070a;
        --panel: #0d1117;
        --muted: #9fb3c8;
        --soft-text: #e2e8f0;
        --glass: rgba(255,255,255,0.03);
        --accent-1: 255,184,84; /* warm yellow */
        --accent-2: 255,94,98;  /* coral */
        --accent-3: 255,141,71; /* orange */
        --radius: 14px;
      }

      *{box-sizing:border-box}
      html,body{height:100%;}
      body{
        margin:0;
        font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        background: radial-gradient(1200px 600px at 10% 10%, rgba(var(--accent-2),0.06), transparent),
                    linear-gradient(180deg,#030406 0%,var(--bg) 100%);
        color:var(--soft-text);
        -webkit-font-smoothing:antialiased;
        -moz-osx-font-smoothing:grayscale;
        padding:28px;
        display:flex;
        justify-content:center;
        align-items:flex-start;
      }

      .container{
        width:min(1100px,95%);
        background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.008));
        border-radius:20px;
        padding:20px;
        box-shadow: 0 18px 40px rgba(2,6,23,0.7), inset 0 1px 0 rgba(255,255,255,0.02);
        overflow:hidden;
        border:1px solid rgba(255,255,255,0.03);
      }

      /* Navbar */
      .nav{
        display:flex;
        align-items:center;
        gap:18px;
        padding:14px 8px;
        border-radius:12px;
        margin-bottom:16px;
      }

      .brand{
        display:flex;
        align-items:center;
        gap:12px;
      }

      .logo-wrap{
        width:54px;height:54px;border-radius:12px;display:inline-grid;place-items:center;
        background:linear-gradient(135deg, rgba(var(--accent-1),0.07), rgba(var(--accent-3),0.06));
        border:1px solid rgba(255,255,255,0.03);
        box-shadow: 0 6px 18px rgba(2,6,23,0.6), 0 0 18px rgba(var(--accent-3),0.02) inset;
      }

      .logo-wrap img{width:36px;height:36px;object-fit:contain}

      .brand-title{
        font-weight:700;font-size:1.15rem;letter-spacing:0.01em;
        background: linear-gradient(90deg, rgba(var(--accent-1),1), rgba(var(--accent-3),1));
        -webkit-background-clip: text; background-clip:text; color:transparent;
      }

      .nav-right{
        margin-left:auto;display:flex;gap:12px;align-items:center;
      }

      .mode-pill{
        padding:8px 12px;border-radius:999px;background:rgba(255,255,255,0.02);font-weight:600;color:var(--muted);
      }

      /* layout */
      .main-grid{display:block;}
      @media (max-width:980px){.main-grid{grid-template-columns:1fr;}}

      /* Left panel (input + engines) */
      .panel{background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);border-radius:var(--radius);padding:18px;border:1px solid rgba(255,255,255,0.03);} 
      .panel h1{margin:0;font-size:1.25rem}

      label{display:block;margin-top:12px;margin-bottom:8px;color:var(--muted);font-weight:600}

      select, input, textarea, button{
        width:100%;border-radius:12px;padding:12px 14px;background:var(--panel);border:1px solid rgba(255,255,255,0.02);color:var(--soft-text);outline:none;font-size:0.98rem
      }

      textarea{min-height:110px;resize:vertical}

      .chips{display:flex;gap:10px;margin-top:10px}
      .chip{padding:10px 12px;border-radius:12px;background:transparent;border:1px solid rgba(255,255,255,0.03);color:var(--muted);cursor:pointer;font-weight:600}
      .chip.active{background:linear-gradient(90deg, rgba(var(--accent-1),0.08), rgba(var(--accent-3),0.06));color:var(--soft-text);box-shadow:0 6px 16px rgba(3,6,23,0.6)}

      .controls{display:flex;gap:12px;margin-top:12px}
      .controls button{flex:1}

      .btn{
        background:linear-gradient(90deg, rgba(var(--accent-1),1), rgba(var(--accent-3),1));
        border:none;
        padding:12px 14px;
        border-radius:12px;
        font-weight:700;
        cursor:pointer;
        color:#000;
        box-shadow:0 4px 14px rgba(var(--accent-3),0.35);
      }
      .btn:disabled{opacity:0.45;cursor:not-allowed}

      /* Right panel (chat + insights) */
      .aside{display:flex;flex-direction:column;gap:12px}

      .chat{background:var(--panel);border-radius:12px;padding:12px;max-height:520px;overflow:auto;border:1px solid rgba(255,255,255,0.08);}
      .msg{padding:10px;border-radius:10px;margin-bottom:10px}
      .msg.user{background:var(--panel);border:1px solid rgba(255,255,255,0.05);}
      .msg.assistant{background:var(--panel);border:1px solid rgba(255,255,255,0.08);}
      .role{font-weight:700;color:var(--muted);display:flex;gap:8px;align-items:center}
      .meta{font-size:0.82rem;color:#8b9db3;margin-top:6px}

      .status{padding:12px;border-radius:12px;margin-top:12px;font-weight:600}
      .status.info{background:rgba(255,255,255,0.02);color:var(--muted)}
      .status.error{background:rgba(64,0,0,0.35);color:#ffd7d7}
      .status.success{background:rgba(0,64,32,0.25);color:#c6ffdf}

      .followup{display:flex;gap:10px;margin-top:10px}
      .followup button{flex:1;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.02);background:transparent}

      /* footer small note */
      .small{font-size:0.85rem;color:#8899b0;margin-top:8px}

      /* subtle neon glow accents */
      .glow{position:relative}
      .glow:after{content:"";position:absolute;inset:auto -30% -40% -30%;filter:blur(60px);opacity:0.06;background:radial-gradient(circle at 20% 20%, rgba(var(--accent-1),1), transparent 10%), radial-gradient(circle at 80% 80%, rgba(var(--accent-2),1), transparent 12%)}

    </style>
  </head>
  <body>
    <div class="container">

      <div class="nav">
        <div class="brand">
          <div class="logo-wrap"><img id="logo" src="logo.png" alt="logo"/></div>
          <div>
            <div class="brand-title">AdViSur</div>
            <div style="font-size:0.8rem;color:var(--muted);margin-top:4px">Smart Study Assistant</div>
          </div>
        </div>

        <div class="nav-right">
          <div class="mode-pill">Local: Dev</div>
        </div>
      </div>

      <div class="main-grid">
        <!-- LEFT: Input / Controls -->
        <div class="panel glow">
          <h1>Ask something</h1>

          <label for="subject">Subject</label>
          <select id="subject">
            <option value="aps">APS</option>
            <option value="constitution">Constitution</option>
          </select>

          <label style="margin-top:14px">Engine</label>
          <div class="chips" id="engine-chips">
            <div class="chip active" data-engine="rag">RAG (Vector DB)</div>
            <div class="chip" data-engine="finetune">Finetune (Local)</div>
            <div class="chip" data-engine="auto">Auto (Finetune ➜ RAG)</div>
          </div>

          <label for="question">Question</label>
          <textarea id="question" rows="4" placeholder="Ask anything from the selected subject…"></textarea>

          <div class="controls">
            <button id="ask-btn" class="btn">Get Answer</button>
            <button id="clear-btn" class="btn" style="background:linear-gradient(90deg, rgba(var(--accent-1),0.85), rgba(var(--accent-3),0.85));color:#000;border:none;box-shadow:0 4px 14px rgba(var(--accent-3),0.25);">Clear</button>
          </div>

          <div id="status" class="status info" style="display:none"></div>

          <div class="small">Tip: try question like what is dpsp?</div>
        </div>

        <!-- RIGHT: Chat and extras -->
        <div class="aside">
          <div class="panel">
            <h1 style="font-size:1rem;margin-bottom:8px">💬 Chat History</h1>
            <div class="chat" id="chat"></div>

            <div id="followup" style="display:none">
              <p class="status info">Do you want to learn more about this topic?</p>
              <div class="followup">
                <button id="yes-btn">Yes — explain more</button>
                <button id="no-btn">No, thanks</button>
              </div>
            </div>
          </div>

          <div class="panel">
            <h1 style="font-size:1rem;margin-bottom:8px">Info</h1>
            <div style="font-size:0.95rem;color:var(--muted)">Backend: <span id="backend-info">Local server</span></div>
            <div style="height:8px"></div>
            <div style="font-size:0.9rem">Engine: <strong id="engine-info">RAG</strong></div>
            <div style="height:10px"></div>
            <div style="font-size:0.9rem;color:var(--muted)">Last query: <span id="last-query">—</span></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = "http://127.0.0.1:8000";
      const subjectEl = document.getElementById("subject");
      const questionEl = document.getElementById("question");
      const askBtn = document.getElementById("ask-btn");
      const clearBtn = document.getElementById("clear-btn");
      const statusEl = document.getElementById("status");
      const chatEl = document.getElementById("chat");
      const followupEl = document.getElementById("followup");
      const yesBtn = document.getElementById("yes-btn");
      const noBtn = document.getElementById("no-btn");
      const engineChips = document.querySelectorAll("#engine-chips .chip");

      const backendInfo = document.getElementById('backend-info');
      const engineInfo = document.getElementById('engine-info');
      const lastQueryEl = document.getElementById('last-query');

      let chatHistory = [];
      let followupMode = false;
      let lastQuery = "";
      let selectedEngine = "rag";

      engineChips.forEach((chip) => {
        chip.addEventListener("click", () => {
          engineChips.forEach((c) => c.classList.remove("active"));
          chip.classList.add("active");
          selectedEngine = chip.dataset.engine;
          engineInfo.textContent = chip.textContent;
        });
      });

      function setStatus(message, type = "info") {
        if (!message) {
          statusEl.style.display = "none";
          return;
        }
        statusEl.textContent = message;
        statusEl.className = `status ${type}`;
        statusEl.style.display = "block";
      }

      function renderChat() {
        chatEl.innerHTML = chatHistory
          .map((entry) => {
            const cls = entry.role === "user" ? "msg user" : "msg assistant";
            const icon = entry.role === "user" ? "🧑" : "🤖";
            const meta = entry.meta ? `<div class=\"meta\">${entry.meta}</div>` : "";
            return `<div class=\"${cls}\"><div class=\"role\">${icon} <strong style=\"margin-left:8px\">${entry.role === 'user' ? 'You' : 'Assistant'}</strong></div><div style=\"margin-top:8px;white-space:pre-wrap;line-height:1.45\">${entry.message.replace(/\n/g, '<br>')}</div>${meta}</div>`;
          })
          .join("");
        chatEl.scrollTop = chatEl.scrollHeight;
      }

      async function sendQuery(payload) {
        const res = await fetch(`${API_BASE}/ask`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!res.ok) {
          const error = await res.json().catch(() => ({ detail: res.statusText }));
          throw new Error(error.detail || `HTTP ${res.status}`);
        }
        return res.json();
      }

      async function handleQuestion(text, followUp = false) {
        if (!text.trim()) {
          setStatus("Please enter a question.", "error");
          return;
        }

        askBtn.disabled = true;
        setStatus(followUp ? "Generating follow-up answer…" : "Generating answer…", "info");

        const payload = {
          subject: subjectEl.value,
          query: text.trim(),
          engine: selectedEngine,
          follow_up: followUp,
          last_query: lastQuery,
        };

        try {
          const data = await sendQuery(payload);

          chatHistory.push({ role: "user", message: followUp ? "(yes)" : text.trim() });

          chatHistory.push({ role: "assistant", message: data.answer || "No response", meta: `Backend: ${data.backend}` });

          renderChat();

          lastQuery = data.echo_query || text.trim();
          followupMode = data.enable_followup ?? true;

          followupEl.style.display = followupMode ? "block" : "none";
          questionEl.value = "";
          setStatus("Answer ready!", "success");

          // update small info area
          backendInfo.textContent = data.backend || 'Local server';
          lastQueryEl.textContent = lastQuery || '—';
        } catch (err) {
          setStatus(err.message, "error");
        } finally {
          askBtn.disabled = false;
        }
      }

      askBtn.addEventListener("click", () => {
        handleQuestion(questionEl.value, false);
      });

      yesBtn.addEventListener("click", () => {
        handleQuestion(`Explain more about ${lastQuery}`, true);
      });

      noBtn.addEventListener("click", () => {
        chatHistory.push({ role: "user", message: "(no)" });
        chatHistory.push({ role: "assistant", message: "😊 Thank you! Feel free to ask a new question anytime!" });
        renderChat();
        followupMode = false;
        followupEl.style.display = "none";
        lastQuery = "";
        setStatus();
      });

      clearBtn.addEventListener('click', () => {
        questionEl.value = '';
        setStatus();
      });

      // initial render
      renderChat();

    </script>
  </body>
</html>
